name: E2E deterministic journeys

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-journeys-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-journeys:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "true"
      DEBUG: "true"
      E2E_START_BACKEND: "true"
      E2E_DETERMINISTIC_MODE: "true"
      TASK_RUNTIME_PLACEMENT_MODE_DEFAULT: local
      DATABASE_URL: sqlite:///./.e2e-journeys.sqlite3
      API_URL: http://127.0.0.1:18080
      BASE_URL: http://127.0.0.1:15173
      E2E_CI_TIER: deterministic-journeys
      E2E_CI_ARTIFACT_ROOT: e2e/output/ci-artifacts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install release browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run deterministic UI journeys
        run: npm run test:e2e:journeys

      - name: Upload deterministic journey failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-journeys-failure-${{ github.run_attempt }}
          path: |
            e2e/output/playwright/
            e2e/output/playwright-report/
            e2e/output/ci-artifacts/
          if-no-files-found: warn
          retention-days: 7
