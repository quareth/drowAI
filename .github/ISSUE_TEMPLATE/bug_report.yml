name: Bug report
description: Report a reproducible problem in supported DrowAI behavior.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues first. Never include credentials, tokens, private targets, personal data, or customer logs. Report vulnerabilities privately through SECURITY.md.
  - type: input
    id: version
    attributes:
      label: DrowAI version or commit
      description: Use a release such as v0.1.0 or a full commit SHA.
      placeholder: v0.1.0 or abc123...
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment path
      options:
        - Local development
        - Standalone
        - Distributed control plane and runner
        - Other or unknown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide sanitized, numbered steps starting from a known state.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python/Node/PostgreSQL/Docker versions, browser, and relevant non-secret configuration.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized evidence
      description: Paste only the smallest useful log or screenshot after removing sensitive data.
      render: shell
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I searched for duplicates and removed all sensitive information.
          required: true
        - label: This is not a vulnerability report or a request to test an unauthorized target.
          required: true
