# Alembic configuration for DrowAI backend
#
# Run migrations from the backend directory:
#   cd backend && alembic upgrade head
#
# Or from project root:
#   alembic -c backend/alembic.ini upgrade head
#
# In Docker:
#   docker exec -it drowai-backend sh -c "cd /app/backend && alembic upgrade head"

[alembic]
# Path to migration scripts, resolved relative to this config file.
script_location = %(here)s/migrations

# Template used to generate new migrations
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate slug to this many characters
# truncate_slug_length = 40

# Database URL - loaded from DATABASE_URL env var in env.py
# Leave empty here; env.py handles it
sqlalchemy.url = 

# Timezone for revision timestamps
timezone = UTC

# Output encoding
output_encoding = utf-8

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
